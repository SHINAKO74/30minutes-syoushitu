<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LAB TERMINAL</title>
<style>
body {margin:0;background:#05080d;color:#e6f1ff;font-family:"Consolas",monospace;}
.container{display:grid;grid-template-columns:2fr 1fr;height:100vh;}
.panel{border:1px solid #1f3b5a;padding:15px;box-sizing:border-box;display:flex;flex-direction:column;min-height:0;}
.header{font-size:22px;letter-spacing:2px;margin-bottom:10px;color:#7dd3ff;}
.log{background:#02050a;flex:1;min-height:0;overflow-y:auto;padding:10px;border:1px solid #123;margin-bottom:10px;font-size:24px;line-height:1.6;}
.input-area{margin-top:10px;}
.command-suggestions{position:absolute;top:50px;left:0;right:0;background:#0a1628;border:2px solid #1e90ff;border-radius:4px;max-height:100px;overflow-y:auto;display:none;z-index:1000;box-shadow:0 4px 6px rgba(0,0,0,0.5);}
.suggestion-item{padding:5px 15px;cursor:pointer;border-bottom:1px solid #1e3a5f;display:flex;justify-content:space-between;align-items:center;}
.suggestion-item:hover{background:#1e3a5f;}
.suggestion-item:last-child{border-bottom:none;}
.suggestion-cmd{color:#00ff00;font-weight:bold;font-size:16px;}
.suggestion-desc{color:#888;font-size:14px;margin-left:15px;}
input{width:100%;background:black;color:#7dd3ff;border:1px solid #1f3b5a;padding:8px;font-size:16px;box-sizing:border-box;}
input:disabled{background:#111;color:#555;border:1px solid #400;cursor:not-allowed;}
button{margin-top:8px;width:100%;background:#0b1c2d;color:#7dd3ff;border:1px solid #1f3b5a;padding:8px;cursor:pointer;font-size:16px;}
button:hover{background:#102b45;}
button:disabled{background:#111;color:#555;border:1px solid #400;cursor:not-allowed;}
.locked-indicator{text-align:center;font-size:14px;color:#ff4d4d;margin-top:4px;letter-spacing:1px;animation:alertFlash 1s infinite;padding:4px;}
.status{font-size:24px;margin-top:6px;font-weight:bold;text-align:center;letter-spacing:1px;}
.timer{font-size:52px;color:#ff6b6b;font-weight:bold;text-align:center;letter-spacing:3px;}
.monitor-frame{
  width:300px; height:300px;
  margin:10px auto;
  border:1px solid #1f3b5a;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.circle{
  width:200px; height:200px;
  border-radius:50%;
  border:3px solid #ff6b6b;
  position:absolute;
  transition:width 1s ease, height 1s ease, left 0.8s ease, top 0.8s ease;
  background:rgba(255,0,0,0.1);
}
.lab{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7dd3ff;font-size:13px;line-height:1.1;font-weight:bold;border:2px solid #1f3b5a;padding:0;background:rgba(0,0,0,0.7);z-index:20;text-align:center;box-sizing:border-box;display:flex;align-items:center;justify-content:center;}
.device-marker{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;background:#ff6b6b;border:2px solid #fff;border-radius:50%;
  box-shadow:0 0 10px #ff6b6b,0 0 20px #ff0000;z-index:10;
  animation:deviceBlink 1.5s infinite;
  transition:left 0.8s ease, top 0.8s ease;
}
.device-marker::before{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:6px;height:6px;background:#fff;border-radius:50%;
}
@keyframes deviceBlink{
  0%{opacity:1;box-shadow:0 0 10px #ff6b6b,0 0 20px #ff0000;}
  50%{opacity:0.3;box-shadow:0 0 5px #ff6b6b,0 0 10px #ff0000;}
  100%{opacity:1;box-shadow:0 0 10px #ff6b6b,0 0 20px #ff0000;}
}
.radius-label{text-align:center;color:#ffb3b3;font-size:28px;font-weight:bold;margin-top:6px;}
.download-box{
  margin-top:8px;padding:10px;border:1px solid #1f3b5a;background:#020a05;
}
.download-box-label{font-size:12px;color:#7dd3ff;letter-spacing:1px;margin-bottom:4px;}
.download-ready{color:#7dd3ff;font-size:15px;font-weight:bold;text-align:center;}
.download-complete{color:#00ff99;font-size:15px;font-weight:bold;text-align:center;animation:glowGreen 1.5s infinite;}
.download-idle{color:#444;font-size:14px;text-align:center;}
@keyframes glowGreen{
  0%{text-shadow:0 0 5px #00ff99;}50%{text-shadow:0 0 15px #00ff99;}100%{text-shadow:0 0 5px #00ff99;}
}
.info-box{margin-top:8px;padding:12px;border:1px solid #1f3b5a;background:#02050a;}
@keyframes alertFlash{0%{background:#400;}50%{background:#800;}100%{background:#400;}}
@keyframes alertFlashGreen{0%{box-shadow:0 0 10px #00ff99;}50%{box-shadow:0 0 25px #00ff99;}100%{box-shadow:0 0 10px #00ff99;}}
.alert-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(120,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:9999;}
.alert-box{border:3px solid #ff4d4d;padding:40px;background:black;color:#ff4d4d;font-size:28px;text-align:center;max-width:80%;}
</style>
</head>
<body>
<div class="container">
  <!-- 左パネル：コマンド＋ログ -->
  <div class="panel">
    <div class="header">LAB TERMINAL :: COMMAND</div>
    <div class="log" id="log"></div>
    <div style="margin-top:auto;position:relative;">
      <div id="commandSuggestions" class="command-suggestions"></div>
      <div class="input-area">
        <input id="commandInput" placeholder="COMMAND INPUT" onkeydown="if(event.key==='Enter'){playClickSound();sendCommand();}" oninput="updateCommandSuggestions()" onfocus="updateCommandSuggestions()" />
        <div id="lockIndicator" class="locked-indicator" style="display:none;">⛔ COMMAND INPUT LOCKED</div>
        <button id="cmdBtn" onclick="playClickSound();sendCommand()">EXECUTE</button>
      </div>
      <div class="input-area">
        <input id="passwordInput" placeholder="PASSWORD / ANSWER INPUT" onkeydown="if(event.key==='Enter'){playClickSound();sendPassword();}" />
        <button onclick="playClickSound();sendPassword()">AUTH / SUBMIT</button>
      </div>
    </div>
  </div>

  <!-- 右パネル：ステータス -->
  <div class="panel">
    <div class="header">消失装置 STATUS</div>

    <!-- システム作動後に表示 -->
    <div id="devicePanel" style="display:none;">
      <div class="timer" id="timer">30:00</div>
      <div class="monitor-frame">
        <div class="circle" id="circle"></div>
        <div class="device-marker" id="deviceMarker"></div>
        <div class="lab" id="labBox">LAB<br>2×4</div>
      </div>
      <div class="radius-label">消失半径: <span id="radius">9</span> m</div>
      <div class="status" id="statusText">消失装置 起動中</div>
    </div>

    <!-- システム作動前 -->
    <div id="hiddenInfo" style="text-align:center;color:#666;margin-top:40px;font-size:16px;">
      対侵入者システム 未作動<br>消失装置情報 非表示
    </div>

    <!-- ダウンロード＋情報取得率（常時表示） -->
    <div class="info-box" style="margin-top:auto;">
      <div style="font-size:13px;color:#7dd3ff;letter-spacing:1px;margin-bottom:4px;">▶ DOWNLOAD STATUS</div>
      <div id="downloadStatus" class="download-idle" style="margin-bottom:10px;">-- 待機中 --</div>
      <div style="border-top:1px solid #1f3b5a;padding-top:8px;">
        <div style="font-size:13px;color:#7dd3ff;margin-bottom:4px;letter-spacing:1px;">情報取得率</div>
        <div style="font-size:32px;color:#00ff99;font-weight:bold;text-align:center;"><span id="infoRate">0</span>%</div>
        <div style="font-size:13px;color:#555;text-align:center;margin-top:4px;">解読済み: <span id="solvedCount">0</span> / 20</div>
      </div>
    </div>
  </div>
</div>
<div id="alert" class="alert-overlay"><div class="alert-box" id="alertBox"></div></div>

<script>
// ==========================================
// 設定（番号が決まったら更新してください）
// ==========================================

// 資料番号（4桁・確定）
const RESOURCE_NUMBERS = {
  'doc1-1': '8472',  // 資料1-1（旧：資料1）
  'doc1-2': '5394',  // 資料1-2（旧：大謎1）
  'doc2-1': '3928',  // 資料2-1
  'doc2-2': '6150',  // 資料2-2
  'doc3-1': '2085',  // 資料3-1
  'doc3-2': '7416',  // 資料3-2
};

// 本1〜5に対応するサブミッション問題番号（確定）
const BOOK_SUBMISSION_NUMBERS = {
  book1: 'NO.12',  // しんり - ダイヤル309
  book2: 'NO.5',   // ゆうち - ダイヤル814
  book3: 'NO.11',  // とんや - ダイヤル408
  book4: 'NO.6',   // いへん - ダイヤル160
  book5: 'NO.17',  // ライフ - ダイヤル916
};

// コマンドロック解除パスワード（確定）
const UNLOCK_PASSWORD = ['かいきん', '解禁', 'kaikin'];

// サブミッション答えリスト（NO.1〜NO.20・確定）
// 各答えは配列で、複数のバリエーションを許容
const submissionAnswers = [
  ['rabo', 'らぼ'],  // NO.1
  ['mail', 'めいる'],  // NO.2
  ['うちゅう', 'うちゆう', '宇宙'],  // NO.3
  ['かいしちてん', '開始地点'],  // NO.4
  ['ゆうち', 'ゆうじ', '遊地', '遊治'],  // NO.5
  ['いへん', '異変'],  // NO.6
  ['ナトリウム', 'なとりうむ', 'natoriumu', 'na'],  // NO.7
  ['チェロ', 'ちぇろ', 'chero', 'cello'],  // NO.8
  ['本', 'ほん', 'hon'],  // NO.9
  ['さいせんばこ', 'さいせん箱', '賽銭箱'],  // NO.10
  ['とんや', '問屋'],  // NO.11
  ['しんり', '心理'],  // NO.12
  ['ほしぞら', '星空'],  // NO.13
  ['nazo', 'なぞ', '謎'],  // NO.14
  ['スター', 'すたー', 'star'],  // NO.15
  ['ANSWER', 'あんさー', 'answer'],  // NO.16
  ['ライフ', 'らいふ', 'life'],  // NO.17
  ['ensou', 'えんそう', '演奏'],  // NO.18
  ['じゃんけん', 'ジャンケン', 'janken'],  // NO.19
  ['ESCAPE', 'えすけーぷ', 'escape']  // NO.20
];

// ==========================================
// ゲーム状態
// ==========================================
let time = 1800;
const MAX_RADIUS = 15;
const MIN_RADIUS = 0;
let radius = 9;
let timerStarted = false;
let timerInterval;
let intrusionTriggered = false;
let commandLocked = false;
let deviceRunning = false;
let vaultOpen = false;
let solvedAnswers = new Set();
let infoRate = 0;

// 装置位置（フレーム内%）
let deviceX = 50;
let deviceY = 50;

// ダウンロード管理
let downloadReadyResource = null;  // パスワード欄に入力された資料番号
let downloadedResource = null;     // ダウンロード済みの資料番号
let downloadComplete = false;      // ダウンロード完了フラグ

// ==========================================
// 正規化関数（大文字小文字、ひらがなカタカナを統一）
// ==========================================
function normalize(str){
  return str
    .toLowerCase() // 小文字に統一
    .replace(/[ァ-ヶ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60)) // カタカナ→ひらがな
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)); // 全角→半角
}


// ラボ内で感知可能な資料（資料4は最初からラボ内に存在）
let inLabResources = new Set([normalize(RESOURCE_NUMBERS['doc3-2'])]);

// コマンド履歴（サジェスト用）
let commandHistory = new Set(['こたつ']);

// キーシーケンス追跡（裏コマンド用）
let keySequence = [];
let lastKeyTime = 0;
const KEY_SEQUENCE_TIMEOUT = 2000; // 2秒以内に入力

// ==========================================
// サウンド
// ==========================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, type, vol, dur){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=freq; o.type=type;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

function playClickSound(){ beep(800,'square',1.0,0.05); }
function playErrorSound(){ 
  // より恐怖感のあるエラー音
  const now=audioCtx.currentTime;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(250, now);
  o.frequency.exponentialRampToValueAtTime(100, now+0.3);
  o.type='sawtooth';
  g.gain.setValueAtTime(1.0, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.3);
  o.start(); o.stop(now+0.3);
}
function playWarningSound(){ beep(440,'triangle',1.0,0.15); }
function playInfoGetSound(){ beep(900,'sine',1.0,0.15); }
function playActivateSound(){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(100, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime+0.5);
  o.type='sawtooth';
  g.gain.setValueAtTime(1.0, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
  o.start(); o.stop(audioCtx.currentTime+0.5);
}
function playDeactivateSound(){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime+0.4);
  o.type='sawtooth';
  g.gain.setValueAtTime(1.0, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.4);
  o.start(); o.stop(audioCtx.currentTime+0.4);
}
function playSuccessSound(){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(523, audioCtx.currentTime);
  o.frequency.setValueAtTime(659, audioCtx.currentTime+0.1);
  o.frequency.setValueAtTime(784, audioCtx.currentTime+0.2);
  o.type='sine';
  g.gain.setValueAtTime(1.0, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
  o.start(); o.stop(audioCtx.currentTime+0.3);
}
function playLogSound(){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=1000+Math.random()*400; o.type='square';
  g.gain.setValueAtTime(0.6, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.03);
  o.start(); o.stop(audioCtx.currentTime+0.03);
}
// 恐怖音1（1つ目のアラート用）- 低音の不協和音
function playHorrorSound1(){
  const now = audioCtx.currentTime;
  
  // 超低音のうなり
  const o1=audioCtx.createOscillator(), g1=audioCtx.createGain();
  o1.connect(g1); g1.connect(audioCtx.destination);
  o1.type='sawtooth';
  o1.frequency.setValueAtTime(80, now);
  o1.frequency.exponentialRampToValueAtTime(40, now+2);
  g1.gain.setValueAtTime(1.0, now);
  g1.gain.setValueAtTime(1.0, now+1.8);
  g1.gain.exponentialRampToValueAtTime(0.001, now+2);
  o1.start(now); o1.stop(now+2);
  
  // 不協和音（高音）
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.connect(g2); g2.connect(audioCtx.destination);
  o2.type='triangle';
  o2.frequency.value=666; // 不協和な周波数
  g2.gain.setValueAtTime(0.7, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now+2);
  o2.start(now); o2.stop(now+2);
  
  // パルス音（緊張感）
  for(let i=0; i<8; i++){
    const o3=audioCtx.createOscillator(), g3=audioCtx.createGain();
    o3.connect(g3); g3.connect(audioCtx.destination);
    o3.type='square';
    o3.frequency.value=200;
    const t = now + i*0.25;
    g3.gain.setValueAtTime(0, t);
    g3.gain.setValueAtTime(0.8, t+0.01);
    g3.gain.exponentialRampToValueAtTime(0.001, t+0.1);
    o3.start(t); o3.stop(t+0.1);
  }
}

// 恐怖音2（3つ目のアラート用）- 絶望的な重低音
function playHorrorSound2(){
  const now = audioCtx.currentTime;
  
  // 重低音のドローン
  const o1=audioCtx.createOscillator(), g1=audioCtx.createGain();
  o1.connect(g1); g1.connect(audioCtx.destination);
  o1.type='sawtooth';
  o1.frequency.setValueAtTime(50, now);
  o1.frequency.exponentialRampToValueAtTime(30, now+3);
  g1.gain.setValueAtTime(1.0, now);
  g1.gain.setValueAtTime(1.0, now+2.8);
  g1.gain.exponentialRampToValueAtTime(0.001, now+3);
  o1.start(now); o1.stop(now+3);
  
  // 不気味な振動音
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.connect(g2); g2.connect(audioCtx.destination);
  o2.type='sine';
  o2.frequency.value=7; // 超低周波でうなる
  g2.gain.setValueAtTime(0.5, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now+3);
  o2.start(now); o2.stop(now+3);
  
  // 絶望的な下降音
  const o3=audioCtx.createOscillator(), g3=audioCtx.createGain();
  o3.connect(g3); g3.connect(audioCtx.destination);
  o3.type='triangle';
  o3.frequency.setValueAtTime(500, now);
  o3.frequency.exponentialRampToValueAtTime(100, now+3);
  g3.gain.setValueAtTime(0.8, now);
  g3.gain.exponentialRampToValueAtTime(0.001, now+3);
  o3.start(now); o3.stop(now+3);
  
  // 衝撃音（最初）
  const o4=audioCtx.createOscillator(), g4=audioCtx.createGain();
  o4.connect(g4); g4.connect(audioCtx.destination);
  o4.type='square';
  o4.frequency.value=100;
  g4.gain.setValueAtTime(1.0, now);
  g4.gain.exponentialRampToValueAtTime(0.001, now+0.3);
  o4.start(now); o4.stop(now+0.3);
}

function playSirenSound(){
  const now=audioCtx.currentTime;
  // メインサイレン（より長く激しく）
  const o1=audioCtx.createOscillator(), g1=audioCtx.createGain();
  o1.connect(g1); g1.connect(audioCtx.destination); o1.type='sawtooth';
  // 6回の警報パターン（2.4秒）
  for(let i=0; i<6; i++){
    const t=i*0.4;
    o1.frequency.setValueAtTime(250,now+t);
    o1.frequency.linearRampToValueAtTime(1000,now+t+0.2);
  }
  g1.gain.setValueAtTime(1.0,now);
  g1.gain.setValueAtTime(1.0,now+2.4);
  g1.gain.exponentialRampToValueAtTime(0.001,now+2.8);
  o1.start(now); o1.stop(now+2.8);
  
  // 低音パルス（恐怖感を演出）
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.connect(g2); g2.connect(audioCtx.destination);
  o2.type='sine'; o2.frequency.value=60;
  for(let i=0; i<12; i++){
    const t=i*0.2;
    g2.gain.setValueAtTime(0,now+t);
    g2.gain.setValueAtTime(1.0,now+t+0.05);
    g2.gain.setValueAtTime(0,now+t+0.1);
  }
  o2.start(now); o2.stop(now+2.8);
  
  // 不協和音（不気味さを追加）
  const o3=audioCtx.createOscillator(), g3=audioCtx.createGain();
  o3.connect(g3); g3.connect(audioCtx.destination);
  o3.type='triangle'; o3.frequency.value=137; // 不協和な周波数
  g3.gain.setValueAtTime(0.6,now);
  g3.gain.exponentialRampToValueAtTime(0.001,now+2.8);
  o3.start(now); o3.stop(now+2.8);
}

// ==========================================
// UI更新
// ==========================================
function log(msg){
  playLogSound();
  const box=document.getElementById('log');
  box.innerHTML+=msg+'<br>';
  box.scrollTop=box.scrollHeight;
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function updateTimer(){
  const m=String(Math.floor(time/60)).padStart(2,'0');
  const s=String(time%60).padStart(2,'0');
  document.getElementById('timer').innerText=`${m}:${s}`;
}

function startTimer(){
  if(timerStarted) return;
  timerStarted=true;
  timerInterval=setInterval(async ()=>{
    time--;
    if(time<=0){
      clearInterval(timerInterval);
      log('>> [消失指示] 発令');
      
      // END判定
      if(deviceRunning && deviceX===50 && deviceY===50){
        // END1「消失」: 装置が起動中 かつ 中央位置
        document.getElementById('statusText').innerText='消失実行';

}

function updateMonitor(){
  document.getElementById('radius').innerText=radius;
  const circle=document.getElementById('circle');
  const lab=document.getElementById('labBox');
  const pxPerMeter=300/20; // フレーム420px = 半径10m×2（半径10mがぎりぎり枠内）

  // ラボのサイズをスケールに合わせて描画（4m×2m）
  lab.style.width=(4*pxPerMeter*1.2)+'px';   // ラボ枠を少し大きめに
  lab.style.height=(2*pxPerMeter*1.2)+'px';
  lab.style.display='flex';
  lab.style.alignItems='center';
  lab.style.justifyContent='center';

  // 円の位置をマーカーに合わせる
  circle.style.left=deviceX+'%';
  circle.style.top=deviceY+'%';
  circle.style.transform='translate(-50%,-50%)';

  if(!deviceRunning){ circle.style.display='none'; }
  else {
    circle.style.display='block';
    const size=radius*2*pxPerMeter;
    circle.style.width=size+'px';
    circle.style.height=size+'px';
  }
}

function moveDevice(x, y){
  deviceX=x; deviceY=y;

async function showTempMessage(title,message,type='red',duration=2000){
  if(type==='red') playErrorSound();
  if(type==='yellow') playWarningSound();
  if(type==='green') playSuccessSound();
  return new Promise(resolve=>{
    const overlay=document.getElementById('alert');
    const box=document.getElementById('alertBox');
    let color='#ff4d4d', bg='rgba(80,0,0,0.92)', shadow='#ff0000', anim='alertFlash 1s infinite';
    if(type==='yellow'){ color='#ffd84d'; bg='rgba(0,0,0,0.85)'; shadow='#ffea00'; anim='none'; }
    if(type==='blue')  { color='#4da6ff'; bg='rgba(0,0,0,0.85)'; shadow='#3399ff'; anim='none'; }
    if(type==='green') { color='#4dff88'; bg='rgba(0,60,30,0.92)'; shadow='#00ff99'; anim='alertFlashGreen 1s infinite'; }
    overlay.style.background=bg; overlay.style.animation=anim;
    box.style.border=`3px solid ${color}`; box.style.color=color; box.style.boxShadow=`0 0 30px ${shadow}`;
    box.innerHTML=`<div style="font-size:36px;font-weight:bold;">${title}</div><div style="margin-top:12px;font-size:20px;white-space:pre-line;">${message}</div>`;
    overlay.style.display='flex';
    setTimeout(()=>{ overlay.style.display='none'; overlay.style.animation='none'; resolve(); }, duration);
  });
}

const commandDescriptions = {
  'こいぬ': '金庫 開放',
  'こたつ': '金庫 閉鎖',
  'しまね': 'ダウンロード',
  'しまうま': 'アップロード（印刷）',

// コマンドサジェスト更新
function updateCommandSuggestions(){
  const input = document.getElementById('commandInput');
  const suggestBox = document.getElementById('commandSuggestions');
  if(!suggestBox || !input) return;
  
  const currentInput = input.value.trim();
  
  if(!window.commandHistory) window.commandHistory = new Set(['こたつ']);
  
  let matches;
  if(!currentInput){
    // 入力がない場合はすべてのコマンド履歴を表示
    matches = Array.from(window.commandHistory);
  } else {
    // 入力に部分一致するコマンドをフィルタ（完全一致は除外）
    matches = Array.from(window.commandHistory).filter(cmd => 
      cmd.startsWith(currentInput) && cmd !== currentInput
    );
  }
  
  // マッチがない場合は非表示
  if(matches.length === 0){
    suggestBox.style.display = 'none';
    return;
  }
  
  // サジェストを表示
  suggestBox.innerHTML = '';
  matches.forEach(cmd => {
    const item = document.createElement('div');
    item.className = 'suggestion-item';
    
    const cmdSpan = document.createElement('span');
    cmdSpan.className = 'suggestion-cmd';
    cmdSpan.textContent = cmd;
    
    const descSpan = document.createElement('span');
    descSpan.className = 'suggestion-desc';
    descSpan.textContent = commandDescriptions[cmd] || '';
    
    item.appendChild(cmdSpan);
    item.appendChild(descSpan);
    
    // クリックで入力欄に反映
    item.onclick = () => {
      input.value = cmd;
      suggestBox.style.display = 'none';
      input.focus();
    };
    
    suggestBox.appendChild(item);
  });
  
  suggestBox.style.display = 'block';
}

// サジェストボックス外クリックで閉じる
document.addEventListener('click', (e) => {

});

// キーボードイベントリスナー（裏コマンド用）
document.addEventListener('keydown', (e) => {
  const now = Date.now();
  
  // タイムアウトチェック（2秒以上経過していたらリセット）
  if(now - lastKeyTime > KEY_SEQUENCE_TIMEOUT){
    keySequence = [];
  }
  lastKeyTime = now;
  
  // 矢印キーのみ記録
  if(e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
    keySequence.push(e.key);
    
    // 最新3つのみ保持
    if(keySequence.length > 3){
      keySequence.shift();
    }
    
    // 3つ連続で同じキーが押されたかチェック
    if(keySequence.length === 3){
      if(keySequence[0] === 'ArrowRight' && keySequence[1] === 'ArrowRight' && keySequence[2] === 'ArrowRight'){
        // 右寄りに移動
        moveDevice(58, 50);
        log('SYSTEM :: 装置位置 更新 (右寄り: 58%, 50%)');
        playSuccessSound();
        keySequence = [];
      } else if(keySequence[0] === 'ArrowLeft' && keySequence[1] === 'ArrowLeft' && keySequence[2] === 'ArrowLeft'){
        // 左寄りに移動
        moveDevice(42, 50);
        log('SYSTEM :: 装置位置 更新 (左寄り: 42%, 50%)');
        playSuccessSound();
        keySequence = [];
      } else if(keySequence[0] === 'ArrowUp' && keySequence[1] === 'ArrowUp' && keySequence[2] === 'ArrowUp'){
        // 中央に移動
        moveDevice(50, 50);
        log('SYSTEM :: 装置位置 更新 (中央: 50%, 50%)');
        playSuccessSound();
        keySequence = [];
      }
    }
  }
});

async function sendCommand(){

    if(!window.commandHistory) window.commandHistory = new Set(['こたつ']);

      ],300);

      document.getElementById('log').innerHTML='';
      playSirenSound();
      await showTempMessage('!! INTRUSION DETECTED !!','対侵入者システム 起動 / ラボ封鎖 / 脱出不可能','red',3500);
      setCommandLock(true);
      await displayLogsSequentially([
        'SYSTEM :: 対侵入者システム 作動',
        'SYSTEM :: 消失装置 起動シーケンス 開始',
        'SYSTEM :: ラボ 即時封鎖',
        'SYSTEM STATUS :: ラボ 閉鎖完了',
        'SYSTEM :: 消失プロセス 開始',
        '<span style="color:#ff6b6b">SYSTEM :: 消失半径を設定 初期値 = 9m</span>',
        'SYSTEM STATUS :: 消失装置 起動完了',
        '<span style="color:#ff6b6b">SYSTEM :: 30分後 [消失指示] 送信予定</span>',
        '<span style="color:#ff6b6b">SYSTEM STATUS :: 金庫開放 停止</span>',
        '<span style="color:#ff6b6b">SYSTEM STATUS :: コマンド入力欄 ロック</span>',

      await showTempMessage('DOWNLOAD ERROR','資料番号をパスワード欄に入力してください','red');
    } else {
      downloadedResource=downloadReadyResource;
      downloadComplete=true;
      updateDownloadStatus();
      log(`SYSTEM :: 資料番号 [${downloadedResource}] ダウンロード完了`);

      // 資料3-1のダウンロード時：本1〜4のサブミッション問題番号を表示
      if(downloadedResource===normalize(RESOURCE_NUMBERS['doc3-1'])){

          '<span style="color:#ff6b6b">SYSTEM :: アップロードを実行する場合は『アップロードコマンド』を入力</span>',

          '<span style="color:#ff6b6b">SYSTEM :: 以下の4冊の中にある『めいろのかけら』を使用せよ</span>',
          `<span style="color:#ff6b6b">SYSTEM :: 本1 対応問題番号 → ${BOOK_SUBMISSION_NUMBERS.book1}</span>`,
          `<span style="color:#ff6b6b">SYSTEM :: 本2 対応問題番号 → ${BOOK_SUBMISSION_NUMBERS.book2}</span>`,
          `<span style="color:#ff6b6b">SYSTEM :: 本3 対応問題番号 → ${BOOK_SUBMISSION_NUMBERS.book3}</span>`,
          `<span style="color:#ff6b6b">SYSTEM :: 本4 対応問題番号 → ${BOOK_SUBMISSION_NUMBERS.book4}</span>`,
        ],300);
      } else {
        await showTempMessage('DOWNLOAD COMPLETE','ダウンロード完了','green');
        log('SYSTEM :: ダウンロード完了');
      }
    }
  }

  // ── しまうま：アップロード（印刷）──
  if(cmd==='しまうま'){
    if(!downloadComplete || !downloadedResource){
      log('SYSTEM :: ダウンロード済み資料なし');
      await showTempMessage('UPLOAD ERROR','先にダウンロードを行ってください','red');

      log(`<span style="color:#ff6b6b">SYSTEM :: ERROR :: 資料 [${downloadedResource}] は既にラボ内に存在します</span>`);
      await showTempMessage('UPLOAD ERROR','この資料はすでにラボ内に存在します\nアップロード不可','red',3000);
    } else {
      log(`SYSTEM :: 資料 [${downloadedResource}] アップロード（印刷）完了`);
      await showTempMessage('UPLOAD COMPLETE','印刷完了\n資料を受け取ってください','green',2500);
      // ダウンロード完了表示はそのまま維持（リセットしない）
    }
  }

  // ── うみ：消失半径 -3m ──
  if(cmd==='うみ'){
    if(!deviceRunning){
      log('SYSTEM :: 消失装置 停止中');
      await showTempMessage('SYSTEM INFO','消失装置は停止中です','yellow');
    } else {
      const prev=radius;
      radius=Math.max(MIN_RADIUS, radius-3);
      updateMonitor();
      log(`SYSTEM :: 消失半径 ${prev}m → ${radius}m`);
      if(radius===0){
        log('SYSTEM :: 消失半径 0m 到達');

  if(cmd==='とりい'){
    const prev=radius;
    radius=Math.min(MAX_RADIUS, radius+3);
    updateMonitor();
    if(!deviceRunning){
      // 装置が停止中の場合は再起動
      // ①再起動表示
      playActivateSound();
      document.getElementById('statusText').innerText='消失装置 起動中';
      log('<span style="color:#ff6b6b">SYSTEM :: 消失装置 再起動</span>');
      await showTempMessage('装置 再起動','消失装置 再起動','yellow',1500);

      log(`SYSTEM :: 消失半径 0m → ${radius}m`);
      await showTempMessage('RADIUS 拡大',`0m → ${radius}m`,'yellow',1000);
      // ③円が0mから滑らかに拡大
      deviceRunning=true;
      const targetRadius=radius;
      radius=0;
      updateMonitor();
      await wait(50);
      radius=targetRadius;
      updateMonitor();
      await wait(1200);
    } else {
      if(prev===radius){
        log('SYSTEM :: 消失半径 上限到達 (15m)');
        await showTempMessage('RADIUS LIMIT','これ以上拡張できません','yellow');
      } else {
        log(`SYSTEM :: 消失半径 ${prev}m → ${radius}m`);
        await showTempMessage('RADIUS +3m',`${prev}m → ${radius}m`,'yellow');
      }
    }
  }



  // ── 隠しコマンド：残り時間変更（4桁数字）──
  if(/^\d{4}$/.test(cmd)){
    const mm=parseInt(cmd.slice(0,2));
    const ss=parseInt(cmd.slice(2,4));
    if(mm<=99 && ss<=59){
      time=mm*60+ss;
      updateTimer();
      log(`SYSTEM :: タイマー変更 → ${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`);
    } else {
      log('SYSTEM :: 無効な時間 (例: 2530 = 25分30秒)');
    }
    input.value='';
    return;
  }

  // 入力欄はクリアしない（再入力しやすくするため）
}

async function sendPassword(){
  const pw=document.getElementById('passwordInput').value.trim();
  if(!pw) return;

  // コマンドロック解除パスワード（ロック中のみ）
  const normalizedUnlockPasswords = UNLOCK_PASSWORD.map(p => normalize(p));
  if(normalizedUnlockPasswords.includes(normalize(pw)) && commandLocked){
    setCommandLock(false);
    log('AUTH SUCCESS :: コマンドロック解除');
    document.getElementById('passwordInput').value='';
    await showTempMessage('UNLOCK SUCCESS','コマンドロック解除','green',2500);
    return;
  }

  // 資料番号の入力（既知の資料番号に一致する場合）
  const knownNums=Object.values(RESOURCE_NUMBERS).map(n => normalize(n));
  const normalizedPwForResource = normalize(pw);
  if(knownNums.includes(normalizedPwForResource)){
    // 新しい資料番号が入力されたらダウンロード完了状態もリセット
    downloadReadyResource=normalizedPwForResource;
    downloadComplete=false;
    downloadedResource=null;
    updateDownloadStatus();
    log(`SYSTEM :: 資料番号 [${pw}] 確認 → ダウンロード準備完了`);
    document.getElementById('passwordInput').value='';
    await showTempMessage('RESOURCE READY',`資料番号: ${pw}\nダウンロード準備完了`,'blue',1800);
    return;
  }

  // サブミッションの答え
  const normalizedPw = normalize(pw);
  // submissionAnswersは配列の配列なので、フラット化して正規化
  const normalizedAnswers = submissionAnswers.flat().map(a => normalize(a));
  if(normalizedAnswers.includes(normalizedPw)){
    if(solvedAnswers.has(normalizedPw)){
      log(`SUBMISSION :: 「${pw}」 解読済み`);
      document.getElementById('passwordInput').value='';
      await showTempMessage('ALREADY SOLVED','この資料は解読済みです','yellow');
    } else {
      solvedAnswers.add(normalizedPw);
      infoRate+=5;
      if(infoRate>100) infoRate=100;
      updateInfoRate();
      playInfoGetSound();
      log(`SUBMISSION :: 「${pw}」 正解！ 情報取得率 +5% → ${infoRate}%`);
      document.getElementById('passwordInput').value='';
      await showTempMessage('CORRECT !',`情報取得率 ${infoRate}%`,'green');
      if(infoRate===100){
        await wait(800);
        await showTempMessage('MISSION COMPLETE','全資料 解読完了！','green',3000);
      }
    }
    return;
  }

  // 無効な入力
  log(`ERROR :: 「${pw}」 無効な入力`);
  document.getElementById('passwordInput').value='';
  await showTempMessage('ERROR','無効な入力です','red');
}
</script>
</body>
</html>
